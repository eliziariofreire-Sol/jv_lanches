<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SOL LANCHES</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-950 text-white min-h-screen">

<!-- NAVBAR -->
<nav class="bg-black border-b border-zinc-800 sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">

        <div class="flex items-center gap-4">
            <div class="text-4xl">🍔</div>

            <div>
                <h1 class="text-3xl font-bold">
                    SOL LANCHES
                </h1>

                <p class="text-zinc-400 text-sm">
                    Os melhores lanches da cidade
                </p>
            </div>
        </div>

        <a href="{{ url_for('carrinho') }}"
           class="flex items-center gap-3 bg-emerald-500 hover:bg-emerald-600
                  text-black px-6 py-3 rounded-2xl font-bold transition">

            🛒 Carrinho
            (<span id="cart-count">0</span>)
        </a>

    </div>
</nav>

<!-- CONTAINER -->
<div class="max-w-7xl mx-auto px-6 py-12">

    <!-- TÍTULO -->
    <div class="mb-12">

        <h2 class="text-4xl font-bold">
            Nosso Cardápio
        </h2>

        <p class="text-zinc-400 mt-3">
            Escolha seu lanche favorito
        </p>

    </div>

    <!-- GRID -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">

        {% for item in itens %}

        <!-- CARD -->
        <div class="bg-zinc-900 rounded-3xl overflow-hidden
                    hover:scale-105 transition duration-300
                    shadow-2xl border border-zinc-800">

            <!-- IMAGEM -->
            <img
                src="{{ item.imagem }}"
                alt="{{ item.nome }}"
                class="w-full h-64 object-cover">

            <!-- CONTEÚDO -->
            <div class="p-8">

                <!-- NOME -->
                <h3 class="text-2xl font-bold">
                    {{ item.nome }}
                </h3>

                <!-- DESCRIÇÃO -->
                <p class="text-zinc-400 mt-3 leading-relaxed">
                    {{ item.descricao }}
                </p>

                <!-- PREÇO + BOTÃO -->
                <div class="flex justify-between items-end mt-8">

                    <span class="text-3xl font-bold text-emerald-400">
                        R$ {{ "%.2f"|format(item.preco) }}
                    </span>

                    <button
                        onclick="addCarrinho({{ item.id }})"
                        class="bg-emerald-500 hover:bg-emerald-600
                               text-black px-6 py-3 rounded-xl
                               font-bold transition">

                        Adicionar
                    </button>

                </div>

            </div>
        </div>

        {% endfor %}

    </div>
</div>

<!-- TOAST -->
<div id="toast"
     class="fixed bottom-5 left-1/2 -translate-x-1/2
            bg-emerald-500 text-black
            px-6 py-3 rounded-xl
            shadow-2xl hidden font-bold">

    Item adicionado ao carrinho!

</div>

<!-- SCRIPT -->
<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-6">
<div class="bg-zinc-900 rounded-3xl overflow-hidden max-w-lg w-full">
<img loading="lazy" id="modal-img" src="" class="w-full h-72 object-cover">
<div class="p-8">
<h2 id="modal-title" class="text-3xl font-bold mb-4"></h2>
<p id="modal-desc" class="text-zinc-400 mb-6"></p>
<div class="flex justify-between items-center">
<span id="modal-price" class="text-3xl font-bold text-emerald-400"></span>
<button onclick="fecharModal()" class="bg-red-500 hover:bg-red-600 px-5 py-3 rounded-xl font-bold">Fechar</button>
</div>
</div>
</div>
</div>
<script>
function abrirModal(nome, descricao, preco, imagem){
document.getElementById("modal-title").innerText = nome;
document.getElementById("modal-desc").innerText = descricao;
document.getElementById("modal-price").innerText = "R$ " + preco;
document.getElementById("modal-img").src = imagem;
let modal = document.getElementById("modal");
modal.classList.remove("hidden");
modal.classList.add("flex");
}
function fecharModal(){
let modal = document.getElementById("modal");
modal.classList.remove("flex");
modal.classList.add("hidden");
}

function addCarrinho(id){

    fetch('/api/adicionar', {

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body: JSON.stringify({
            item_id:id
        })

    })

    .then(res => res.json())

    .then(data => {

        document.getElementById("cart-count").innerText =
            data.total_itens

        let toast = document.getElementById("toast")

        toast.classList.remove("hidden")

        setTimeout(()=>{

            toast.classList.add("hidden")

        }, 1500)

    })

}

</script>

</body>
</html>
