<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - SOL LANCHES</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
</head>

<body class="bg-zinc-950 text-white p-10">

<h1 class="text-3xl font-bold mb-10">📊 Dashboard</h1>

<!-- RESUMO -->
<div class="grid grid-cols-2 gap-6 mb-10">

    <div class="bg-zinc-900 p-6 rounded-2xl">
        <h2 class="text-zinc-400">Total de Pedidos</h2>
        <p class="text-4xl text-emerald-400 font-bold">
            {{ total_pedidos }}
        </p>
    </div>

    <div class="bg-zinc-900 p-6 rounded-2xl">
        <h2 class="text-zinc-400">Total Vendido</h2>
        <p class="text-4xl text-emerald-400 font-bold">
            R$ {{ total_vendas }}
        </p>
    </div>

</div>

<!-- PEDIDOS -->
<h2 class="text-2xl mb-6">Pedidos de Hoje</h2>

<div class="space-y-4">

    {% for p in pedidos %}
    <div class="bg-zinc-900 p-6 rounded-2xl">

        <div class="flex justify-between">
            <div>
                <p class="font-bold text-lg">
                    Pedido #{{ p.id }}
                </p>
                <p class="text-zinc-400">
                    Cliente: {{ p.nome_cliente }}
                </p>
            </div>

            <div class="text-emerald-400 text-xl font-bold">
                R$ {{ p.total }}
            </div>
        </div>

    </div>
    {% else %}
    <p class="text-zinc-500">Nenhum pedido hoje</p>
    {% endfor %}

</div>

<!-- LOGOUT -->
<a href="/admin/logout"
   class="inline-block mt-10 bg-red-500 hover:bg-red-600 px-6 py-3 rounded-xl font-bold">
    Sair
</a>

</body>
</html>
